<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Audio Spectrum Visualizer</title>
  <style>
    body { 
      background: #111; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      justify-content: center; 
      height: 100vh; 
      margin: 0; 
      font-family: sans-serif;
      color: white;
    }

    /* Title at the upper middle */
    h1 {
      position: absolute;
      top: 20px;
      margin: 0;
      letter-spacing: 2px;
      font-weight: 300;
      text-transform: uppercase;
    }

    canvas { border: 1px solid #333; margin: 10px; }
    
    button { 
      padding: 10px 20px; 
      font-size: 16px; 
      cursor: pointer; 
      z-index: 10; /* Ensure button stays clickable */
    }

    /* Attribution at the bottom right */
    .attribution {
      position: absolute;
      bottom: 15px;
      right: 20px;
      font-size: 12px;
      color: #666;
    }
  </style>
</head>
<body>

  <h1>Audio Visualizer</h1>

  <button id="startBtn">Start Microphone</button>
  <canvas id="waveform" width="800" height="200"></canvas>
  <canvas id="frequency" width="800" height="200"></canvas>

  <div class="attribution">made by purinsu14</div>

  <script src="src/main.ts" type="module"></script>
</body>
</html>
